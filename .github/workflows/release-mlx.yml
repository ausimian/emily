name: Release MLX prebuilt

# Build libmlx.a + mlx.metallib + headers from a specified MLX tag and
# publish as a GitHub release asset. Invoke once per variant (no-jit,
# jit) to populate a release; the tag `mlx-<version>` groups both
# tarballs so they move in lockstep. Manual-only — prebuilt releases are
# cut by hand when bumping the MLX pin in mix.exs.

on:
  workflow_dispatch:
    inputs:
      mlx_version:
        description: 'MLX release tag to build (without the v prefix)'
        default: '0.31.2'
        required: true
      build_type:
        description: 'Build variant'
        type: choice
        options: [no-jit, jit]
        default: no-jit

permissions:
  contents: write

jobs:
  build:
    # macos-14 for the AOT build (matches the older-macOS lane we want
    # to keep working); macos-26 for the JIT build because the NAX
    # kernel sources transitively include
    # <MetalPerformancePrimitives/MetalPerformancePrimitives.h>, a
    # header first shipped in the macOS 26.2 SDK.
    runs-on: ${{ inputs.build_type == 'jit' && 'macos-26' || 'macos-14' }}
    env:
      MLX_VERSION: ${{ inputs.mlx_version }}
      BUILD_TYPE:  ${{ inputs.build_type }}
    steps:
      - name: Checkout Emily (for build script)
        uses: actions/checkout@v6

      - name: Checkout MLX source
        uses: actions/checkout@v6
        with:
          repository: ml-explore/mlx
          ref: v${{ inputs.mlx_version }}
          path: mlx-src

      - name: Build prebuilt tarball
        run: |
          JIT=$([[ "$BUILD_TYPE" == "jit" ]] && echo 1 || echo 0)
          ./scripts/build-mlx-prebuilt.sh "$(pwd)/mlx-src" "$MLX_VERSION" "$JIT"

      - name: Resolve asset name
        id: asset
        run: |
          VARIANT=$([[ "$BUILD_TYPE" == "jit" ]] && echo jit || echo aot)
          NAME="mlx-${MLX_VERSION}-macos-arm64-${VARIANT}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Create or reuse draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: mlx-${{ inputs.mlx_version }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --draft \
              --title "MLX ${MLX_VERSION} prebuilts" \
              --notes "Prebuilt libmlx.a + mlx.metallib + headers for macOS (arm64).

          Produced by .github/workflows/release-mlx.yml. Tarballs are
          consumed by Emily's compile step (mix.exs).

          Built from https://github.com/ml-explore/mlx at tag v${MLX_VERSION}."
          fi

      - name: Upload tarball + checksum
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: mlx-${{ inputs.mlx_version }}
          NAME: ${{ steps.asset.outputs.name }}
        run: |
          gh release upload "$TAG" "${NAME}.tar.gz" "${NAME}.tar.gz.sha256" --clobber

      - name: Summary
        env:
          NAME: ${{ steps.asset.outputs.name }}
        run: |
          {
            echo "## MLX prebuilt uploaded"
            echo ""
            echo "- Tag: \`mlx-${MLX_VERSION}\` (draft)"
            echo "- Asset: \`${NAME}.tar.gz\`"
            echo ""
            echo "### SHA256"
            echo ""
            echo '```'
            cat "${NAME}.tar.gz.sha256"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
