name: CI

on:
  push:
    branches: [main]
    tags: ['[0-9]+.[0-9]+.[0-9]+*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_full_tests:
        description: 'Run full model tests (whisper_full, vit_full, distilbert_full, training_full, fast_kernels_full)'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precommit:
    name: precommit (${{ matrix.os }}, jit=${{ matrix.jit }})
    if: github.event_name != 'push' || github.ref_type == 'branch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Emily is Apple-Silicon only. macos-14 (arm64, M1) covers the
        # AOT path on older macOS; macos-26 is required for the JIT
        # build because MLX's NAX JIT sources transitively include
        # <MetalPerformancePrimitives/MetalPerformancePrimitives.h>,
        # which only ships in the macOS 26.2+ SDK.
        include:
          - os: macos-14
            jit: "0"
          - os: macos-26
            jit: "1"
    env:
      MIX_ENV: test
      EMILY_MLX_JIT: ${{ matrix.jit }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ runner.os }}-jit${{ matrix.jit }}-${{ hashFiles('mix.lock', 'c_src/**', 'Makefile', '.tool-versions', '.gitmodules') }}
          restore-keys: build-${{ runner.os }}-jit${{ matrix.jit }}-

      # MLX cmake build (~6 min from source) and NIF object files.
      # Keyed by the vendored MLX submodule commit + NIF sources; the
      # JIT flag changes libmlx/metallib bytes so each flavour caches
      # separately (the install dir itself gains a `-jit` suffix, but
      # the NIF .o files under build-<version>/ are shared, so we still
      # partition the top-level cache).
      - name: Cache MLX and NIF objects
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/emily
          key: mlx-${{ runner.os }}-jit${{ matrix.jit }}-${{ hashFiles('.gitmodules', 'c_src/**', 'Makefile') }}
          restore-keys: mlx-${{ runner.os }}-jit${{ matrix.jit }}-

      # The Bumblebee cache holds tiny-random HuggingFace fixtures
      # downloaded by the conformance suite (~3 MB across 7 repos).
      # Cached by conformance test content so new fixtures invalidate;
      # restore-keys lets unrelated changes reuse the existing cache.
      - name: Cache Bumblebee fixtures
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/bumblebee
          key: bumblebee-${{ runner.os }}-${{ hashFiles('test/emily/conformance/**') }}
          restore-keys: bumblebee-${{ runner.os }}-

      - run: mix deps.get

      - run: mix precommit

      # Conformance tests are excluded from the default suite because
      # they require network access on a cold cache (see
      # test/test_helper.exs). In CI we always want them green — a
      # DistilBERT forward pass is the canonical integration signal
      # that no Nx op on the transformer critical path has regressed.
      - run: mix test --only conformance

  # Tagged-release gate: exercise the Hex tarball the way a downstream
  # consumer would — unpack it into a throwaway project, consume it via
  # a path dep, compile the vendored MLX source, and run a sanity
  # snippet against Emily.Backend + Emily.Compiler. Catches missing
  # package files or broken build inputs before `mix hex.publish`.
  smoke-test:
    name: Hex package smoke test
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache MLX build
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/emily
          key: mlx-smoke-${{ runner.os }}-${{ hashFiles('.gitmodules', 'c_src/**', 'Makefile') }}
          restore-keys: mlx-smoke-${{ runner.os }}-

      - run: scripts/smoke-test-package.sh

  # Manual-only job: exercises the heavy `*_full` conformance and
  # training variants excluded from the default suite (see
  # test/test_helper.exs). These download full-size checkpoints
  # (hundreds of MB) and take multi-minute wall time, so they run
  # on demand via the Actions "Run workflow" button rather than on
  # every push / PR.
  full-tests:
    name: full model tests (jit=${{ matrix.jit }})
    if: github.event_name == 'workflow_dispatch' && inputs.run_full_tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Same split as the precommit job: jit=1 requires the macOS
        # 26.2+ SDK for MetalPerformancePrimitives.h.
        include:
          - os: macos-14
            jit: "0"
          - os: macos-26
            jit: "1"
    env:
      MIX_ENV: test
      EMILY_MLX_JIT: ${{ matrix.jit }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ runner.os }}-jit${{ matrix.jit }}-${{ hashFiles('mix.lock', 'c_src/**', 'Makefile', '.tool-versions', '.gitmodules') }}
          restore-keys: build-${{ runner.os }}-jit${{ matrix.jit }}-

      - name: Cache MLX and NIF objects
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/emily
          key: mlx-${{ runner.os }}-jit${{ matrix.jit }}-${{ hashFiles('.gitmodules', 'c_src/**', 'Makefile') }}
          restore-keys: mlx-${{ runner.os }}-jit${{ matrix.jit }}-

      # Full checkpoints land here (Bumblebee + scidata MNIST).
      - name: Cache Bumblebee fixtures
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/bumblebee
          key: bumblebee-full-${{ runner.os }}-${{ hashFiles('test/emily/conformance/**', 'test/emily/bumblebee/**') }}
          restore-keys: |
            bumblebee-full-${{ runner.os }}-
            bumblebee-${{ runner.os }}-

      - run: mix deps.get

      - run: mix compile

      - name: whisper_full
        run: mix test --only whisper_full

      - name: vit_full
        run: mix test --only vit_full

      - name: distilbert_full
        run: mix test --only distilbert_full

      - name: training_full
        run: mix test --only training_full

      - name: fast_kernels_full
        run: mix test --only fast_kernels_full

  # ASan CI deferred: requires OTP built with --enable-sanitizers=address
  # (macOS SIP blocks DYLD_INSERT_LIBRARIES, and late-loaded libasan
  # fails). See Makefile and RELEASE.md for details.
